name: Maven Central Release

on:
  workflow_dispatch:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0  # Important for git history

    - name: Set up JDK 8
      uses: actions/setup-java@v4
      with:
        java-version: '8'
        distribution: 'corretto'

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v2
      with:
        role-to-assume: ${{ secrets.ASSUME_ROLE_ARN }}
        aws-region: us-east-1  # Explicitly set to us-east-1 as per doc
        role-session-name: maven-publish-session

    - name: Setup GPG and Gradle properties
      run: |
        # Get GPG keys from AWS Secrets Manager
        aws secretsmanager get-secret-value \
          --secret-id secrets.GPG_KEY_ID \
          --query SecretString \
          --output text > keys.json

        # Extract keys
        jq -r '.privateKey' keys.json > private-key.asc
        jq -r '.publicKey' keys.json > public-key.asc

        # Import GPG keys
        gpg --batch --import private-key.asc
        gpg --import public-key.asc

        # Get key ID
        KEY_ID=$(gpg --list-keys --keyid-format SHORT | grep sec | awk '{print $2}' | cut -d'/' -f2)

        # # Get Sonatype credentials
        # SONATYPE_CREDS=$(aws secretsmanager get-secret-value \
        #   --secret-id sonatype_central_credentials \
        #   --query SecretString \
        #   --output text)

